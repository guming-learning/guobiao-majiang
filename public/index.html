<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>国标麻将</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 竖屏提示 -->
  <div id="rotate-hint">
    <div class="rotate-icon">📱↻</div>
    <div>请将手机横屏以获得最佳体验</div>
  </div>

  <!-- 登录 -->
  <section id="login-screen" class="screen active">
    <div class="login-box">
      <h1 class="logo">国标麻将</h1>
      <p class="subtitle">无需注册 · 输入昵称即可开玩 · 8番起胡</p>
      <input id="name-input" type="text" maxlength="12" placeholder="输入你的昵称" />
      <button id="login-btn" class="btn btn-primary">进入大厅</button>
      <p class="tip">提示：4 人凑齐并全部准备后自动开局</p>
    </div>
  </section>

  <!-- 大厅 -->
  <section id="lobby-screen" class="screen">
    <div class="lobby-header">
      <h2>游戏大厅</h2>
      <div class="lobby-user">你好，<span id="lobby-name"></span></div>
    </div>
    <div class="lobby-actions">
      <button id="create-room-btn" class="btn btn-primary">＋ 创建房间</button>
      <button id="refresh-btn" class="btn">⟳ 刷新</button>
    </div>
    <div class="room-list-title">房间列表</div>
    <div id="room-list" class="room-list"></div>
  </section>

  <!-- 牌桌 -->
  <section id="table-screen" class="screen">
    <div id="topbar" class="topbar">
      <span id="tb-room"></span>
      <span id="tb-round"></span>
      <span id="tb-wall"></span>
      <button id="sound-btn" class="btn btn-small" title="音效开关">🔊</button>
      <button id="leave-btn" class="btn btn-small">退出</button>
    </div>

    <div id="board" class="board">
      <div class="seat-area seat-top"    data-pos="top"></div>
      <div class="middle-row">
        <div class="seat-area seat-left" data-pos="left"></div>
        <div id="center" class="center"></div>
        <div class="seat-area seat-right" data-pos="right"></div>
      </div>
      <div class="seat-area seat-bottom" data-pos="bottom"></div>
    </div>

    <div id="action-bar" class="action-bar"></div>

    <!-- 等待/准备 浮层 -->
    <div id="wait-overlay" class="overlay">
      <div class="overlay-card">
        <h3>等待开局</h3>
        <div id="wait-seats" class="wait-seats"></div>
        <div class="wait-btns">
          <button id="add-bot-btn" class="btn">＋ 添加机器人</button>
          <button id="ready-btn" class="btn btn-primary">准备</button>
        </div>
        <div class="overlay-tip">满 4 人且全部准备后自动开始 · 可用机器人补满空位</div>
      </div>
    </div>

    <!-- 结算 浮层 -->
    <div id="result-overlay" class="overlay">
      <div class="overlay-card" id="result-card"></div>
    </div>

    <!-- 事件提示 -->
    <div id="toast" class="toast"></div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/tiles.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
